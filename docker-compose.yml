version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:15
    container_name: behavioural_portfolio_db
    environment:
      POSTGRES_DB: behavioural_portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: behavioural_portfolio_backend
    environment:
      DATABASE_URL: postgresql://postgres:password123@database:5432/behavioural_portfolio
      SECRET_KEY: zetheta-super-secret-key-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./ml_pipeline/models:/app/../ml_pipeline/models

  # Next.js Frontend
  frontend:
    build: ./frontend
    container_name: behavioural_portfolio_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: